<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Equall Museum · All-in-One App</title>
    <style>
        *, *::before, *::after { 
            box-sizing: border-box; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        /* Views (Σελίδες) - Κρυμμένες από προεπιλογή */
        .view {
            display: none;
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            padding: 24px;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Ενεργή σελίδα */
        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 1. Στυλ για το Ticket View */
        .text-center { text-align: center; }
        .museum-title { font-size: 24px; font-weight: 700; color: #1d1d1f; margin-bottom: 8px; }
        .museum-subtitle { font-size: 14px; color: #86868b; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .ticket-btn { display: block; width: 100%; padding: 16px; background-color: #000000; color: white; text-align: center; font-weight: 600; border-radius: 12px; border: none; cursor: pointer; font-size: 16px; }
        .app-btn { display: block; width: 100%; padding: 16px; background-color: #2196F3; color: white; text-align: center; font-weight: 600; border-radius: 12px; margin-top: 12px; border: none; cursor: pointer; font-size: 16px; }

        /* 2. Στυλ για το Map Hub & Rooms */
        .map-preview { width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .nfc-status { padding: 12px; background: #e3f2fd; color: #0d47a1; border-radius: 8px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .room-link { display: block; padding: 12px; margin: 8px 0; background: #eee; color: #333; text-decoration: none; border-radius: 6px; text-align: center; font-weight: 500; cursor: pointer; }
        .hero-image { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .room-title { color: #2196F3; border-bottom: 2px solid #2196F3; padding-bottom: 8px; margin-top: 0; }
        .nav-btn { display: block; text-align: center; margin-top: 20px; padding: 12px; background: #333; color: white; text-decoration: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Μίνι χάρτης με έξυπνη κουκίδα */
        .mini-map-container { position: relative; width: 100%; margin: 20px 0; }
        .mini-map { width: 100%; border-radius: 8px; opacity: 0.6; }
        .location-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff5722;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: pulse-dot 1.5s infinite;
            display: none; /* Εμφανίζεται δυναμικά με JS */
        }
        @keyframes pulse-dot { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- VIEW 1: Η Αρχική Σελίδα (Εισιτήριο) -->
    <div id="view-ticket" class="view active text-center">
        <div class="museum-title">Equall Museum</div>
        <div class="museum-subtitle">Entry Pass & Guide</div>
        <button class="ticket-btn" onclick="alert('Ticket Booked!')">Get My Ticket</button>
        <button class="app-btn" onclick="switchView('view-hub')">Launch Museum App (NFC)</button>
    </div>

    <!-- VIEW 2: Ο Κεντρικός Χάρτης (Hub) -->
    <div id="view-hub" class="view">
        <h2 class="text-center">Μουσείο Συμπερίληψης</h2>
        <p class="text-center">Πλησιάστε το κινητό σας στη μακέτα ή επιλέξτε δωμάτιο:</p>
        <img src="panoramic-map.jpg" alt="Museum Map" class="map-preview">
        <div id="nfc-message" class="nfc-status">📡 Το NFC σκανάρει στο παρασκήνιο...</div>
        <div class="rooms-list">
            <div class="room-link" onclick="openRoom(1, 15, 20)">1. Είσοδος / Υποδοχή</div>
            <div class="room-link" onclick="openRoom(2, 45, 30)">2. Αίθουσα Προσβασιμότητας</div>
            <div class="room-link" onclick="openRoom(3, 75, 25)">3. Νίκη της Σαμοθράκης</div>
            <div class="room-link" onclick="openRoom(4, 30, 65)">4. Αισθητηριακό Δωμάτιο</div>
            <div class="room-link" onclick="openRoom(5, 70, 70)">5. Υβριδική Αίθουσα</div>
        </div>
        <button class="nav-btn" onclick="switchView('view-ticket')">🔙 Πίσω στα Εισιτήρια</button>
    </div>

    <!-- VIEW 3: Δυναμική Σελίδα Δωματίου -->
    <div id="view-room" class="view">
        <img id="room-img" src="" alt="Room Image" class="hero-image">
        <h2 id="room-title" class="room-title"></h2>
        <p id="room-desc"></p>
        
        <div class="mini-map-container">
            <img src="panoramic-map.jpg" alt="Χάρτης" class="mini-map">
            <div id="map-dot" class="location-dot"></div>
        </div>
        
        <button class="nav-btn" onclick="switchView('view-hub')">🔙 Επιστροφή στον Χάρτη</button>
    </div>

    <script>
        // Δεδομένα για τα 5 δωμάτια
        const roomsData = {
            1: {
                title: "1. Υποδοχή & Καλωσόρισμα (Είσοδος)",
                img: "room1-cut.jpg",
                desc: "Καλώς ορίσατε στο μουσείο μας! Ο χώρος αυτός δημιουργήθηκε με ένα βαθύ όραμα: να αποδείξουμε ότι η πολιτιστική κληρονομιά ανήκει σε όλους, χωρίς αποκλεισμούς. Στόχος μας είναι να προσφέρουμε μια μοναδική, βιωματική εμπειρία όπου η ιστορία, η τέχνη και η τεχνολογία συναντιούνται."
            },
            2: {
                title: "2. Προσβασιμότητα & Συμπερίληψη στην Πράξη",
                img: "room2-cut.jpg",
                desc: "Διαθέτει μια καινοτόμο, πτυσσόμενη σκάλα που μετατρέπεται αυτόματα σε ασφαλή ράμπα για άτομα με κινητική αναπηρία. Παράλληλα, λειτουργεί μια έξυπνη οθόνη που ανιχνεύει την ένταση του ήχου και υπενθυμίζει στους επισκέπτες να διατηρούν τα επίπεδα θορύβου χαμηλά."
            },
            3: {
                title: "3. Η Νίκη της Σαμοθράκης",
                img: "room3-cut.jpg",
                desc: "Εδώ φιλοξενείται το εμβληματικό έκθεμα. Διαθέτει ειδικό μηχανισμό που χαμηλώνει ελεγχόμενα το ύψος του εκθέματος για να είναι εύκολα ορατό από παιδιά, καθώς και εξελιγμένο σύστημα δυναμικής σκίασης."
            },
            4: {
                title: "4. Αισθητηριακή Εμπειρία (Απτική & Ακουστική)",
                img: "room4-cut.jpg",
                desc: "Ένας ειδικά διαμορφωμένος χώρος για άτομα με οπτική αναπηρία. Περιλαμβάνει ακριβή αντίγραφα των εκθεμάτων για εξερεύνηση μέσω της αφής, καθώς και εξειδικευμένα ακουστικά ερεθίσματα που ζωντανεύουν την ιστορία."
            },
            5: {
                title: "5. Υβριδικός Χώρος (Μάθηση & Διάλογος)",
                img: "room5-cut.jpg",
                desc: "Μια αίθουσα διπλής λειτουργίας. Από τη μία πλευρά, ένας ζωντανός παιδότοπος γεμάτος εκπαιδευτικά παιχνίδια και δραστηριότητες για παιδιά. Από την άλλη, ένας σύγχρονος χώρος διαλέξεων και παρουσιάσεων."
            }
        };

        // Εναλλαγή "σελίδων" (Views)
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // Άνοιγμα συγκεκριμένου δωματίου και τοποθέτηση της κουκίδας (X, Y ποσοστά)
        function openRoom(id, leftPercent, topPercent) {
            const room = roomsData[id];
            document.getElementById('room-title').innerText = room.title;
            document.getElementById('room-img').src = room.img;
            document.getElementById('room-desc').innerText = room.desc;
            
            // Τοποθέτηση κουκίδας στον μίνι χάρτη
            const dot = document.getElementById('map-dot');
            dot.style.left = leftPercent + '%';
            dot.style.top = topPercent + '%';
            dot.style.display = 'block';
            
            switchView('view-room');
        }

        // Αυτόματο Background Web NFC Scanning
        async function startNFCScan() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    ndef.addEventListener("reading", ({ message }) => {
                        for (const record of message.records) {
                            if (record.recordType === "url") {
                                const decoder = new TextDecoder();
                                const url = decoder.decode(record.data);
                                
                                // Διαβάζει το URL από το NFC (π.χ. ...#room3) και ανοίγει το σωστό view
                                if(url.includes('#room1')) openRoom(1, 15, 20);
                                else if(url.includes('#room2')) openRoom(2, 45, 30);
                                else if(url.includes('#room3')) openRoom(3, 75, 25);
                                else if(url.includes('#room4')) openRoom(4, 30, 65);
                                else if(url.includes('#room5')) openRoom(5, 70, 70);
                            }
                        }
                    });
                } catch (error) {
                    console.log(error);
                }
            }
        }

        window.addEventListener('load', startNFCScan);
    </script>
</body>
</html>
