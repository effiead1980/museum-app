<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Automatic Museum Map Cropper</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; background: #f5f5f5; }
    .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
    .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    img { max-height: 200px; display: block; margin-top: 10px; border: 1px solid #ddd; }
    button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>

  <h1>Αυτόματο Κόψιμο Δωματίων</h1>
  <p>Αν η εικόνα "museum-map.jpg" βρίσκεται στον ίδιο φάκελο, τα δωμάτια θα κοπούν αυτόματα παρακάτω.</p>
  <button id="download-all" style="display:none;" onclick="downloadAll()">Λήψη Όλων των Δωματίων (Download All)</button>

  <div class="container" id="output"></div>

  <script>
    const imageSrc = 'museum-map.jpg';
    
    // Οι ακριβείς συντεταγμένες για κάθε δωμάτιο
    const crops = [
      { name: 'room1-cut.jpg', x: 25,  y: 20, w: 210, h: 240 },
      { name: 'room2-cut.jpg', x: 235, y: 20, w: 210, h: 240 },
      { name: 'room3-cut.jpg', x: 445, y: 20, w: 225, h: 240 },
      { name: 'room4-cut.jpg', x: 670, y: 20, w: 210, h: 240 },
      { name: 'room5-cut.jpg', x: 880, y: 10, w: 275, h: 255 }
    ];

    const img = new Image();
    img.src = imageSrc;
    
    img.onload = function() {
      const outputDiv = document.getElementById('output');
      
      crops.forEach((crop, index) => {
        // Δημιουργία ενός αόρατου canvas για το crop
        const canvas = document.createElement('canvas');
        canvas.width = crop.w;
        canvas.height = crop.h;
        const ctx = canvas.getContext('2d');
        
        // Κόψιμο και σχεδίαση
        ctx.drawImage(img, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h);
        
        // Μετατροπή σε εικόνα για προβολή και κατέβασμα
        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
        crop.dataUrl = dataUrl; // αποθήκευση για το μαζικό κατέβασμα
        
        // Δημιουργία Card στο UI
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <strong>Δωμάτιο ${index + 1}</strong><br><small>${crop.name}</small>
          <img src="${dataUrl}" alt="${crop.name}">
        `;
        outputDiv.appendChild(card);
      });
      
      // Εμφάνιση του κουμπιού λήψης
      document.getElementById('download-all').style.display = 'inline-block';
    };

    img.onerror = function() {
      alert('Δεν βρέθηκε η εικόνα "museum-map.jpg". Βεβαιώσου ότι αυτό το αρχείο HTML είναι αποθηκευμένο στον ίδιο φάκελο με την εικόνα της μακέτας.');
    };

    function downloadAll() {
      crops.forEach((crop, index) => {
        setTimeout(() => {
          const a = document.createElement('a');
          a.href = crop.dataUrl;
          a.download = crop.name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }, index * 400); // Μικρή καθυστέρηση για να μην μπλοκάρει ο browser τα πολλαπλά downloads
      });
    }
  </script>
</body>
</html>
